<style>
:root{--bg:#f5f0e8;--text:#2a2520;--accent:#8b3a3a;--card-bg:#fffdf7;--border:#d4c9b8;--subtle:#7a7168;--labour:#c4453c;--tory:#1e4d8c;--case-bg:#f0ebe0;--green:#3a7a4c}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}.container{max-width:700px;margin:0 auto;padding:40px 20px 60px}header{text-align:center;margin-bottom:40px;padding-bottom:28px;border-bottom:2px solid var(--border)}header h1{font-family:'Libre Baskerville',serif;font-size:2em;font-weight:700;margin-bottom:10px;color:var(--accent)}header .subtitle{font-size:1em;color:var(--subtle);max-width:520px;margin:0 auto;line-height:1.7}.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;margin-bottom:32px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease}.q-counter{text-align:center;font-size:.82em;color:var(--subtle);margin-bottom:20px}.question-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:28px;margin-bottom:20px}.question-text{font-family:'Libre Baskerville',serif;font-size:1.1em;line-height:1.6;margin-bottom:20px}.option{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:all .2s ease;font-size:.92em;line-height:1.5}.option:hover{border-color:var(--accent);background:#f0ebe0}.option:active{transform:scale(.98)}.results-container{display:none}.result-hero{background:var(--card-bg);border:2px solid var(--accent);border-radius:10px;padding:32px;text-align:center;margin-bottom:32px}.result-hero .label{font-size:.8em;text-transform:uppercase;letter-spacing:2px;color:var(--subtle);margin-bottom:8px}.result-hero h2{font-family:'Libre Baskerville',serif;font-size:1.6em;color:var(--accent);margin-bottom:12px}.result-hero .desc{font-size:.95em;line-height:1.7;color:var(--text);max-width:540px;margin:0 auto 16px}.result-hero .moral{font-size:.85em;color:var(--subtle);font-style:italic;border-top:1px solid var(--border);padding-top:14px;margin-top:14px}.result-hero .moral strong{font-style:normal;color:var(--text)}.runners-up{background:var(--case-bg);border-radius:8px;padding:20px 24px;margin-bottom:32px}.runners-up h3{font-family:'Libre Baskerville',serif;font-size:1em;color:var(--accent);margin-bottom:10px}.runner{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:.88em;border-bottom:1px solid var(--border)}.runner:last-child{border-bottom:none}.runner-name{font-weight:600;flex-shrink:0;margin-right:12px}.runner-bar-wrap{width:120px;height:8px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}.runner-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .6s ease}.reveal-btn{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:16px;font-family:'DM Sans',sans-serif;font-size:1em;font-weight:600;cursor:pointer;margin-bottom:32px;transition:background .2s}.reveal-btn:hover{background:#6e2e2e}.full-map{display:none}.section-label{font-family:'Libre Baskerville',serif;font-size:1.3em;font-weight:700;margin:36px 0 8px}.section-label.labour{color:var(--labour)}.section-label.tory{color:var(--tory)}.section-sublabel{color:var(--subtle);font-size:.85em;margin-bottom:20px;font-style:italic}.tribe-card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:14px;position:relative}.tribe-card.is-you{border-color:var(--accent);border-width:2px;background:#fdf8f0}.tribe-card.is-you::after{content:'\2190 You';position:absolute;top:12px;right:14px;font-size:.72em;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px}.tribe-name{font-family:'Libre Baskerville',serif;font-size:1.05em;font-weight:700;margin-bottom:3px}.tribe-people{font-size:.82em;color:var(--accent);margin-bottom:8px;font-weight:500}.tribe-desc{font-size:.88em;color:var(--text);line-height:1.6}.tribe-moral{font-size:.78em;color:var(--subtle);border-top:1px solid var(--border);padding-top:8px;margin-top:8px;font-style:italic}.tribe-moral strong{color:var(--text);font-style:normal}.case-study-box{background:var(--case-bg);border:2px solid var(--border);border-radius:8px;padding:24px;margin-top:40px}.case-study-box h2{font-family:'Libre Baskerville',serif;font-size:1.15em;color:var(--accent);margin-bottom:6px}.case-study-box .cs-subtitle{font-size:.82em;color:var(--subtle);font-style:italic;margin-bottom:14px}.case-study-box p{font-size:.88em;line-height:1.7;margin-bottom:10px}.vote-row{display:flex;gap:14px;margin:16px 0}.vote-col{flex:1;background:var(--card-bg);border-radius:6px;padding:14px;border:1px solid var(--border)}.vote-col h3{font-family:'Libre Baskerville',serif;font-size:.9em;margin-bottom:6px}.vote-col.for h3{color:var(--green)}.vote-col.against h3{color:var(--accent)}.vote-col ul{list-style:none;font-size:.78em;line-height:1.8}.frameworks{background:var(--card-bg);border:2px solid var(--accent);border-radius:8px;padding:24px;margin-top:40px}.frameworks h2{font-family:'Libre Baskerville',serif;font-size:1.15em;color:var(--accent);margin-bottom:14px}.frameworks p{font-size:.9em;line-height:1.7;margin-bottom:10px}.frameworks p:last-child{margin-bottom:0}.reading{margin-top:40px;padding-top:28px;border-top:2px solid var(--border)}.reading h2{font-family:'Libre Baskerville',serif;font-size:1.15em;color:var(--accent);margin-bottom:14px}.reading p{font-size:.88em;line-height:1.7;margin-bottom:6px}.restart-btn{display:block;width:100%;background:none;border:2px solid var(--accent);color:var(--accent);border-radius:8px;padding:14px;font-family:'DM Sans',sans-serif;font-size:.95em;font-weight:600;cursor:pointer;margin-top:40px;transition:all .2s}.restart-btn:hover{background:var(--accent);color:#fff}@media(max-width:600px){header h1{font-size:1.6em}.question-card{padding:20px}.container{padding:24px 16px 60px}.vote-row{flex-direction:column}.result-hero{padding:24px 20px}}

<body>
<div class="container">
  <header>
    <h1>What's Your Political Tribe?</h1>
    <p class="subtitle">12 tribes hide inside British politics. Answer 19 questions to find yours — most people are surprised where they land.</p>
  </header>
  <div id="quiz">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="q-counter" id="qCounter">Question 1 of 19</div>
    <div class="question-card" id="questionCard"></div>
  </div>
  <div class="results-container" id="results"></div>
</div>
<script>
var tribes={fabian:{name:"Fabian Technocrats",people:"Starmer, Reeves, Streeting, McFadden. Historically Blair, Brown, Mandelson. The Fabian Society, IPPR, Resolution Foundation.",desc:"Believe in managed progress through rational institutions. Meritocratic, data-driven, instinctively centrist. Their ideal society is basically Denmark. Comfortable with capitalism if properly regulated. Intellectually descended from the Webbs. Some are influenced by Effective Altruism\u2019s faith that suffering is calculable and progress measurable (Peter Singer, Will MacAskill) \u2014 though this is more a philosophical undercurrent than a parliamentary faction.",moral:"What produces the best outcomes for the most people.",side:"left"},identitarian:{name:"The Identitarian Left",people:"Kehinde Andrews, Priyamvada Gopal, Afua Hirsch, Reni Eddo-Lodge. Institutionally embedded in universities, HR departments, DEI consultancies, parts of the charity sector and the arts.",desc:"Intellectual roots not in the labour movement but in post-structuralism, critical race theory, and Foucault\u2019s analysis of power. The key move: liberal universalism and individual rights are themselves expressions of white, male, colonial power. Moral authority derives from positionality \u2014 where you sit in a matrix of oppression and privilege. A traditional socialist says the real divide is class; this tribe says it\u2019s race, gender, sexuality, and colonial history.",moral:"Your relationship to structures of oppression determines the authority of your voice.",side:"left"},revolutionary:{name:"Revolutionary Marxists / Anti-Imperialists",people:"The SWP, Counterfire, George Galloway, John Rees, Lindsey German. The Morning Star. Stop the War Coalition. The Gaza independents in Parliament.",desc:"Materialist and structural \u2014 imperialism is the highest stage of capitalism, Western foreign policy is the root of global conflict, liberal democracy is a bourgeois facade. Many are religiously informed, drawing on Islamic or Christian traditions of justice. Crucially, this tribe regards revolutionary violence as potentially legitimate \u2014 which puts them at odds with every other tendency in the Labour coalition.",moral:"Are you on the side of the workers or of capital? Everything else is superstructure.",side:"left"},progressive:{name:"The Progressive Left (Corbynite)",people:"Corbyn, McDonnell, Zarah Sultana, Nadia Whittome, Owen Jones. Novara Media, Tribune magazine.",desc:"Sits uncomfortably between several tribes. Economically democratic socialist \u2014 public ownership, redistribution, industrial strategy. On foreign policy, lean anti-imperialist. On social questions, aligned with the identitarian left. The fatal tension within Corbynism: its economic base in working-class communities was culturally conservative in ways its activist base in London and university towns was not.",moral:"Solidarity \u2014 but stretched across economic radicalism and social progressivism in ways that don\u2019t always cohere.",side:"left"},degrowth:{name:"Green-Adjacent Degrowthers",people:"Caroline Lucas, George Monbiot, Jason Hickel. Extinction Rebellion, Just Stop Oil. The Green Party under Adrian Ramsay and Carla Denyer.",desc:"Material progress is the problem, but social progress \u2014 expanding autonomy, dismantling traditional hierarchies \u2014 is still the project. Radical austerity about consumption paired with radical liberalism about identity and social relations. The irony: telling people who\u2019ve never had material security that the real project is consuming less is an easier sell in a seminar than in a working-class town.",moral:"The planet sets limits that override human desire. Growth itself is the enemy.",side:"left"},bluelabour:{name:"Blue Labour / Post-Liberals",people:"Maurice Glasman, Jon Cruddas, Dan Carden, Paul Embery, Jonathan Rutherford, Shabana Mahmood. Intellectually rooted in Tawney, G.D.H. Cole, MacIntyre, Karl Polanyi.",desc:"Economically left, culturally conservative. Rooted in Christian socialism and trade union communitarianism. Suspicious of both free markets and progressive social liberalism. Material progress \u2014 lifting people out of poverty \u2014 is a genuine moral obligation. But the endless expansion of autonomous individual choice eventually undermines the communities that make good lives possible. Currently in flux: Glasman has moved toward alignment with MAGA and Reform. Whether this is the logical destination of Blue Labour or a betrayal of it is the live argument.",moral:"Human dignity is given by God \u2014 every person has equal worth, and that worth imposes obligations on society.",side:"left"},union:{name:"Union Pragmatists",people:"Sharon Graham (Unite), Christina McAnea (Unison), Gary Smith (GMB). Historically Ernest Bevin.",desc:"Bread-and-butter materialism. Wages, conditions, pensions, job security. Often socially moderate or conservative in personal outlook. Instinctively suspicious of culture war politics on either side because it distracts from the things that actually matter to working people.",moral:"Did your pay go up? Are your conditions safe? Everything else is noise.",side:"left"},burkean:{name:"Burkean Traditionalists",people:"The late Roger Scruton. Jesse Norman. Rory Stewart (now politically homeless). John Gray (writes for the New Statesman but belongs here intellectually).",desc:"Gradual reform, inherited institutions, the Crown, the Church, the countryside. Suspicious of ideology from any direction \u2014 including free market radicalism. Revere custom, continuity, and the wisdom of the dead. Nearly extinct as an organised parliamentary force \u2014 largely purged after Brexit.",moral:"We inherit obligations we didn\u2019t choose. Duty, custom, and continuity outweigh individual desire.",side:"right"},thatcherite:{name:"Thatcherite Free Marketeers",people:"Liz Truss, Kwasi Kwarteng, Jacob Rees-Mogg, Kemi Badenoch (partly). The IEA, Adam Smith Institute, TaxPayers\u2019 Alliance. The Telegraph editorial line.",desc:"Low tax, deregulation, individual enterprise. Intellectually descended from Hayek and Friedman. Comfortable with globalisation, comfortable with creative destruction. Their fundamental weakness: no answer to the question \u201cwhat holds a society together once the market has dissolved every traditional bond?\u201d",moral:"Free exchange between consenting individuals is the foundation of a just society.",side:"right"},natcon:{name:"National Conservatives / Post-Liberal Right",people:"Danny Kruger, Nick Timothy, Miriam Cates. Phillip Blond (ResPublica). UnHerd is their natural media home.",desc:"Sceptical of free markets, sceptical of mass immigration, interested in community, family, and national identity. Share a surprising amount of intellectual DNA with Blue Labour \u2014 both draw on MacIntyre and communitarianism \u2014 but arrive from a different starting point on redistribution and unions.",moral:"The nation is a real community with real obligations \u2014 not just an economic zone.",side:"right"},populist:{name:"Reform-Adjacent Populists",people:"Nigel Farage, Richard Tice, Lee Anderson, Ann Widdecombe. GB News is the media expression.",desc:"More a mood than a philosophy. Anti-establishment, anti-immigration, rhetorically anti-elite. Draw energy from genuine grievances about deindustrialisation and cultural dislocation but lack a coherent intellectual framework beyond opposition to the status quo. Currently the most electorally dynamic force on the right.",moral:"The people vs the elite. A friend-enemy distinction that can be captured by left or right.",side:"right"},libertarian:{name:"Libertarians / Free Speech Absolutists",people:"Toby Young (Free Speech Union). Brendan O\u2019Neill, Claire Fox (Spiked Online \u2014 former Revolutionary Communists turned libertarians, quite a journey). Some younger Spectator writers.",desc:"Small but vocal. Sceptical of the state in almost all domains. Overlap with Thatcherites on economics but push further. Philosophically closer to American conservatism than anything traditionally British. The Spiked crowd retain a Marxist analytical framework but have arrived at libertarian conclusions, which baffles everyone.",moral:"Leave people alone and let them choose. Individual sovereignty is sacred.",side:"right"}};

var questions=[
{text:"A factory in a northern town is about to close. 300 jobs will be lost. What\u2019s your instinct?",options:[
{label:"The government should intervene \u2014 retrain workers, attract new industry, protect the community.",scores:{fabian:2,bluelabour:1,union:1}},
{label:"This is tragic but markets adapt. The workers will find new opportunities if we remove barriers.",scores:{thatcherite:3,libertarian:1}},
{label:"This is what happens when capital is free to move but workers aren\u2019t. The whole system needs changing.",scores:{revolutionary:2,progressive:2}},
{label:"This is why we need to protect national industry. A country that can\u2019t make things is a country that\u2019s lost its soul.",scores:{natcon:2,populist:1,bluelabour:1}}
]},
{text:"A terminally ill person wants help ending their life. What\u2019s the right response?",options:[
{label:"It\u2019s their body and their choice. Regulate it carefully, but respect their autonomy.",scores:{libertarian:2,fabian:1,degrowth:1}},
{label:"The compassionate answer is better palliative care, not offering death as a solution to a system that\u2019s failed them.",scores:{bluelabour:3,natcon:2,burkean:1}},
{label:"I worry about the pressure on vulnerable people \u2014 the poor and disabled will feel they should get out of the way.",scores:{progressive:2,union:1,bluelabour:1}},
{label:"This is a question for communities and families, not the state. We\u2019ve lost the ability to care for our dying.",scores:{burkean:3,natcon:1}}
]},
{text:"A university invites a controversial speaker. Students protest and demand the event be cancelled. You think:",options:[
{label:"Let them speak. The answer to bad speech is more speech, not silence.",scores:{libertarian:3,thatcherite:1}},
{label:"It depends who it is. Platforming people who deny the humanity of marginalised groups does real harm.",scores:{identitarian:3,progressive:1}},
{label:"Universities should be places of robust debate. Discomfort is the price of education.",scores:{fabian:1,burkean:2}},
{label:"The real question is who funds these speakers and what interests they serve. Follow the money.",scores:{revolutionary:3,progressive:1}}
]},
{text:"Housing is unaffordable. What\u2019s the priority?",options:[
{label:"Build more. Reform planning, increase density, let the market work.",scores:{thatcherite:2,fabian:2}},
{label:"Housing is a commons, not a commodity. Community land trusts, social housing, and co-operatives.",scores:{bluelabour:3,progressive:1}},
{label:"The landlord class extracts wealth from those who actually work. Abolish the conditions that make housing speculation profitable.",scores:{revolutionary:2,progressive:1}},
{label:"Start by cutting immigration. You can\u2019t build your way out of demand that never stops growing.",scores:{populist:3,natcon:1}}
]},
{text:"What\u2019s your honest reaction to the British Empire?",options:[
{label:"A complex legacy \u2014 some institutions and infrastructure, but also enormous cruelty and exploitation.",scores:{fabian:2,burkean:1}},
{label:"A system of racial domination whose effects are still felt today. Reparative justice is needed.",scores:{identitarian:3,revolutionary:1}},
{label:"It built the modern world, for good and ill. We should be honest about both, not ashamed of our history.",scores:{natcon:2,populist:1,burkean:1}},
{label:"It was driven by capitalist extraction. The real victims were working people everywhere \u2014 including in Britain.",scores:{revolutionary:2,progressive:2}}
]},
{text:"Economic growth or environmental limits \u2014 which matters more?",options:[
{label:"Growth, managed intelligently, is how we fund public services and lift people out of poverty.",scores:{fabian:3,union:1}},
{label:"The obsession with growth is destroying the planet. We need to learn to live within limits.",scores:{degrowth:3}},
{label:"Growth is fine if it serves families and communities rather than shareholders and algorithms.",scores:{bluelabour:2,natcon:2}},
{label:"Green austerity is a luxury belief. Working people need jobs and wages, not lectures about consumption.",scores:{union:2,populist:2}}
]},
{text:"A child is gender-nonconforming \u2014 they prefer clothes and activities typically associated with the opposite sex. What\u2019s the healthy response?",options:[
{label:"Affirm who they are. If they say they\u2019re trans, listen to them and support their journey.",scores:{progressive:2,identitarian:2}},
{label:"Let kids be kids. A girl who likes trucks is still a girl. Anything else risks reinforcing the very stereotypes we should be dismantling.",scores:{bluelabour:2,burkean:1,union:1}},
{label:"This is a medical and psychological question, not a political one. Follow the evidence carefully, especially with children.",scores:{fabian:2,libertarian:1}},
{label:"The whole framework is wrong. Why are we so obsessed with gender? Focus on class and material conditions.",scores:{revolutionary:2,union:1}}
]},
{text:"What holds a good society together?",options:[
{label:"Strong institutions \u2014 the rule of law, a free press, democratic accountability.",scores:{fabian:2,burkean:1,libertarian:1}},
{label:"Shared traditions, faith, family, and a sense of belonging to a place.",scores:{bluelabour:2,natcon:2,burkean:2}},
{label:"Solidarity between working people. Everything else is window dressing.",scores:{union:2,revolutionary:1,progressive:1}},
{label:"Justice. A society built on oppression isn\u2019t held together \u2014 it\u2019s held down.",scores:{identitarian:2,revolutionary:2}}
]},
{text:"Immigration. What\u2019s your honest position?",options:[
{label:"Managed migration is economically beneficial. The debate is too often driven by prejudice rather than evidence.",scores:{fabian:2,progressive:1}},
{label:"Borders are tools of capital. Workers of the world should be free to move.",scores:{revolutionary:2,identitarian:1}},
{label:"Communities need stability. Rapid change without consent undermines trust and solidarity \u2014 and the poorest pay the price.",scores:{bluelabour:3,natcon:1,union:1}},
{label:"We\u2019ve lost control. The people have spoken repeatedly and been ignored.",scores:{populist:3,natcon:1}}
]},
{text:"It\u2019s Friday night. What are you reading or watching?",options:[
{label:"The Economist or the FT. Maybe a policy paper if it\u2019s good.",scores:{fabian:3,thatcherite:1}},
{label:"A Substack about postliberalism, or an old Orwell essay. Maybe UnHerd.",scores:{bluelabour:2,natcon:2,burkean:1}},
{label:"Novara Media or Tribune. Or arguing on Twitter.",scores:{progressive:3,identitarian:1}},
{label:"Nothing political. I\u2019m knackered from work.",scores:{union:3}},
{label:"A George Monbiot piece about ecological collapse. Or a podcast about degrowth.",scores:{degrowth:3}},
{label:"GB News or Talk TV. Someone needs to say what everyone\u2019s thinking.",scores:{populist:3}}
]},
{text:"The government proposes a wealth tax on assets over \u00a310 million. Your reaction?",options:[
{label:"About time. Extreme wealth concentration is incompatible with a functioning democracy.",scores:{progressive:2,revolutionary:2}},
{label:"Sounds fair in principle but will drive capital abroad. Better to close loopholes and tax income properly.",scores:{fabian:3}},
{label:"Taxation is legalised theft. People earned that money \u2014 let them keep it.",scores:{thatcherite:3,libertarian:2}},
{label:"Fine, but only if the revenue goes to communities that need it \u2014 not to fund more London consultants.",scores:{bluelabour:1,populist:2,union:2}}
]},
{text:"Should employers use positive discrimination to increase workforce diversity?",options:[
{label:"Yes. Without active measures, structural inequalities just reproduce themselves.",scores:{identitarian:3,progressive:1}},
{label:"No. Hire on merit. Anything else is patronising to the people it claims to help.",scores:{libertarian:2,thatcherite:2}},
{label:"The real issue is class, not identity. A black Etonian doesn\u2019t need a leg up over a white kid from Hartlepool.",scores:{bluelabour:2,union:2,revolutionary:1}},
{label:"Diversity targets are fine as long as they\u2019re evidence-based and don\u2019t become performative box-ticking.",scores:{fabian:2,burkean:1}}
]},
{text:"The UK commits to net zero by 2050. Is this the right priority?",options:[
{label:"2050 is far too late. We need radical transformation now \u2014 degrowth, not green growth.",scores:{degrowth:3}},
{label:"It\u2019s the right goal but we need a realistic transition that doesn\u2019t destroy jobs and livelihoods.",scores:{fabian:2,union:1}},
{label:"Net zero is an elite project. Working people will pay the price while the rich fly private.",scores:{populist:3,union:1}},
{label:"We should honour our obligation to creation and to future generations, but not by hollowing out the communities that already exist.",scores:{bluelabour:2,natcon:2,burkean:1}}
]},
{text:"A statue of a historical figure with links to the slave trade stands in your city centre. What should happen?",options:[
{label:"Take it down. Public monuments are about who we honour, and we shouldn\u2019t honour slave traders.",scores:{identitarian:3,progressive:1}},
{label:"Put it in a museum with full context. Don\u2019t erase history \u2014 explain it.",scores:{fabian:2,burkean:1}},
{label:"Leave it. Tearing down statues is the mob deciding what history is acceptable. This is how civilisations unravel.",scores:{burkean:2,natcon:1,populist:2}},
{label:"The statue is a distraction. The real legacy of slavery is in the economic structures that still exploit the global south.",scores:{revolutionary:3}}
]},
{text:"A tech company automates 10,000 jobs. GDP rises but unemployment spikes. Your view?",options:[
{label:"Creative destruction. New industries will emerge. The state should help with transition, not block progress.",scores:{thatcherite:2,fabian:2}},
{label:"If work has dignity, then destroying it for profit is a moral failure \u2014 not a neutral efficiency gain.",scores:{bluelabour:3,natcon:2}},
{label:"Tax the robots. Use automation to shorten the working week and share the gains.",scores:{progressive:2,degrowth:2}},
{label:"This is what capitalism does \u2014 replaces people with machines and calls it progress. The system serves capital, not workers.",scores:{revolutionary:2,union:2}}
]},
{text:"Someone is convicted of their fifth shoplifting offence in two years. Should they go to prison?",options:[
{label:"Yes. At some point consequences have to mean something. Repeat offenders are taking the public for mugs.",scores:{populist:2,thatcherite:2}},
{label:"Prison for shoplifting is absurd and expensive. It doesn\u2019t work. Invest in the things that actually stop reoffending \u2014 housing, mental health, addiction services.",scores:{fabian:2,progressive:2}},
{label:"Ask why they\u2019re shoplifting five times. This is poverty and desperation, not a criminal justice problem \u2014 it\u2019s a systemic one.",scores:{revolutionary:2,identitarian:2}},
{label:"Community sentences with real structure \u2014 work, mentoring, accountability to the people they\u2019ve harmed. Prison destroys whatever\u2019s left of someone\u2019s connection to their community.",scores:{bluelabour:2,burkean:2,union:1}}
]},
{text:"A man is convicted of a serious violent assault. The judge gives him four years \u2014 he\u2019ll serve two. Is that enough?",options:[
{label:"No. Violent criminals should serve their full sentence. The public has a right to be protected.",scores:{populist:2,thatcherite:2,natcon:1}},
{label:"Sentence length matters less than what happens during it. Two years of proper rehabilitation beats ten years of warehousing.",scores:{fabian:2,progressive:2}},
{label:"The focus on individual punishment distracts from the structural violence of poverty, racism, and inequality that produces crime in the first place.",scores:{identitarian:2,revolutionary:2}},
{label:"Justice means something to victims. It also means something to the wider community. Short sentences for serious violence corrode public trust in the whole system.",scores:{bluelabour:2,burkean:2,union:1}}
]},
{text:"The government proposes a significant increase in defence spending. Your reaction?",options:[
{label:"Necessary. The world is getting more dangerous and we have obligations to NATO and our allies.",scores:{fabian:2,burkean:2,natcon:1}},
{label:"We should be strong enough to defend ourselves, but the real threat to most people isn\u2019t foreign armies \u2014 it\u2019s stagnant wages and crumbling public services. Don\u2019t raid the NHS to fund missiles.",scores:{union:2,bluelabour:2}},
{label:"Western military spending is the problem, not the solution. NATO expansion and arms sales fuel the very conflicts we claim to oppose.",scores:{revolutionary:3,progressive:2}},
{label:"Spend whatever it takes. A country that won\u2019t defend itself won\u2019t exist for long.",scores:{populist:2,thatcherite:2}}
]},
{text:"The government cuts the foreign aid budget to fund domestic priorities. Your reaction?",options:[
{label:"Shameful. We\u2019re one of the richest countries on earth. Helping the world\u2019s poorest is a moral obligation.",scores:{fabian:2,progressive:2}},
{label:"Good. Charity begins at home. We\u2019ve got food banks and homeless veterans \u2014 sort that out first.",scores:{populist:3,union:1}},
{label:"Foreign aid is neo-colonial soft power disguised as generosity. It serves Western interests, not the global poor.",scores:{revolutionary:2,identitarian:2}},
{label:"There\u2019s a case for aid rooted in Christian duty, but it should go through churches and communities, not through government bureaucracies and NGOs that mostly employ middle-class graduates.",scores:{bluelabour:2,burkean:2,natcon:1}}
]}
];

var currentQ=0;var scores={};Object.keys(tribes).forEach(function(k){scores[k]=0});

function renderQuestion(){var q=questions[currentQ];var card=document.getElementById('questionCard');document.getElementById('progressFill').style.width=((currentQ/questions.length)*100)+'%';document.getElementById('qCounter').textContent='Question '+(currentQ+1)+' of '+questions.length;var html='<div class="question-text">'+q.text+'</div>';q.options.forEach(function(opt,i){html+='<div class="option" onclick="answer('+i+')">'+opt.label+'</div>'});card.innerHTML=html;card.style.opacity=0;requestAnimationFrame(function(){card.style.transition='opacity 0.3s ease';card.style.opacity=1})}

function answer(idx){var q=questions[currentQ];var chosen=q.options[idx].scores;for(var tribe in chosen){if(chosen.hasOwnProperty(tribe)){scores[tribe]+=chosen[tribe]}}currentQ++;if(currentQ<questions.length){renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}else{showResults()}}

function showResults(){document.getElementById('quiz').style.display='none';var resultsDiv=document.getElementById('results');resultsDiv.style.display='block';var sorted=Object.entries(scores).sort(function(a,b){return b[1]-a[1]});var topKey=sorted[0][0];var topTribe=tribes[topKey];var maxScore=sorted[0][1];var html='<div class="result-hero"><div class="label">Your tribe</div><h2>'+topTribe.name+'</h2><div class="desc">'+topTribe.desc+'</div><div class="moral"><strong>Your moral framework:</strong> '+topTribe.moral+'</div></div><div class="runners-up"><h3>Your other tendencies</h3>';var runnersUp=sorted.slice(1,6).filter(function(s){return s[1]>0});runnersUp.forEach(function(item){var key=item[0];var score=item[1];var pct=Math.round((score/maxScore)*100);html+='<div class="runner"><span class="runner-name">'+tribes[key].name+'</span><div class="runner-bar-wrap"><div class="runner-bar" style="width:'+pct+'%"></div></div></div>'});html+='</div><button class="reveal-btn" onclick="showFullMap(\''+topKey+'\')">See all 12 tribes \u2192</button><div class="full-map" id="fullMap"></div>';resultsDiv.innerHTML=html;window.scrollTo({top:0,behavior:'smooth'})}

function showFullMap(topKey){document.querySelector('.reveal-btn').style.display='none';var mapDiv=document.getElementById('fullMap');mapDiv.style.display='block';var leftTribes=['fabian','identitarian','revolutionary','progressive','degrowth','bluelabour','union'];var rightTribes=['burkean','thatcherite','natcon','populist','libertarian'];var html='<div class="section-label labour">The Left</div><div class="section-sublabel">Seven worldviews, not all in the same party \u2014 or any party</div>';leftTribes.forEach(function(k){var t=tribes[k];var isYou=k===topKey?' is-you':'';html+='<div class="tribe-card'+isYou+'"><div class="tribe-name">'+t.name+'</div><div class="tribe-people">'+t.people+'</div><div class="tribe-desc">'+t.desc+'</div><div class="tribe-moral"><strong>Moral framework:</strong> '+t.moral+'</div></div>'});html+='<div class="section-label tory">The Right</div><div class="section-sublabel">Five worldviews and a mood</div>';rightTribes.forEach(function(k){var t=tribes[k];var isYou=k===topKey?' is-you':'';html+='<div class="tribe-card'+isYou+'"><div class="tribe-name">'+t.name+'</div><div class="tribe-people">'+t.people+'</div><div class="tribe-desc">'+t.desc+'</div><div class="tribe-moral"><strong>Moral framework:</strong> '+t.moral+'</div></div>'});
html+='<div class="case-study-box"><h2>Case Study: The Assisted Dying Vote (Nov 2024)</h2><div class="cs-subtitle">When the tribes break free of party lines</div><p>The Terminally Ill Adults Bill was a free vote \u2014 no whip, pure conscience. Danny Kruger (national conservative), Jeremy Corbyn (progressive left), Wes Streeting (Fabian), Kemi Badenoch (Thatcherite), and all the Gaza independents voted the same way \u2014 against. All Green MPs voted for.</p><div class="vote-row"><div class="vote-col for"><h3>Voted For (330)</h3><ul><li>\u2726 Most Fabian technocrats</li><li>\u2726 All Green MPs</li><li>\u2726 Most progressive left</li><li>\u2726 Many Thatcherites</li><li>\u2726 Libertarians</li></ul></div><div class="vote-col against"><h3>Voted Against (275)</h3><ul><li>\u2726 National conservatives (Kruger)</li><li>\u2726 Blue Labour / post-liberals</li><li>\u2726 All Gaza independents</li><li>\u2726 Corbyn</li><li>\u2726 Religious MPs across parties</li><li>\u2726 Disability rights advocates</li></ul></div></div><p>The \u201cagainst\u201d coalition is hardest to explain on a left-right axis. What unites Kruger and Corbyn? A shared suspicion that individual autonomy isn\u2019t the highest political value \u2014 that offering death to vulnerable people in an unequal society is naive about how power operates.</p><p>Two completely different moral languages. One parliament.</p></div>';
html+='<div class="frameworks"><h2>Why Everyone Is Shouting Past Each Other</h2><p>These tribes don\u2019t just disagree about policy. They disagree about what counts as a <em>good reason</em> for anything. A utilitarian thinks the right answer is whatever maximises wellbeing. An identitarian thinks it depends on who\u2019s speaking. A Christian socialist thinks human dignity is non-negotiable regardless of outcomes. A Burkean thinks what our ancestors built deserves deference. A libertarian thinks your freedom to choose trumps all of the above.</p><p>The real fault lines don\u2019t run left to right. They run along different axes: <strong>communitarian vs individualist</strong>, <strong>globalist vs sovereigntist</strong>, and \u2014 as Christopher Lasch argued \u2014 <strong>those who believe in limits vs those who don\u2019t</strong>.</p><p>Notice who your unexpected neighbours are. Blue Labour and the national conservatives are closer to each other than either is to its own party leadership. Fabians and Cameroon Tories are essentially the same managerial class with different rosettes.</p></div>';
html+='<div class="reading"><h2>Further Reading</h2><p><strong>Christopher Lasch</strong> \u2014 <em>The True and Only Heaven</em> (1991). The single best book on why \u201cleft vs right\u201d no longer captures the real divide.</p><p><strong>Alasdair MacIntyre</strong> \u2014 <em>After Virtue</em> (1981). Why modern moral argument is incoherent and what that means for politics.</p><p><strong>Gary Dorrien</strong> \u2014 <em>American Democratic Socialism</em> (2021). The definitive history of secular and religious socialisms.</p><p><strong>Paul Embery</strong> \u2014 <em>Despised</em> (2020). The Blue Labour case that the modern left loathes the working class.</p><p><strong>Roger Scruton</strong> \u2014 <em>How to Be a Conservative</em> (2014). The Burkean case, elegantly made.</p><p><strong>Eugene McCarraher</strong> \u2014 <em>The Enchantments of Mammon</em> (2019). Capitalism as religion.</p></div>';
html+='<button class="restart-btn" onclick="restart()">Take the quiz again</button>';mapDiv.innerHTML=html;mapDiv.scrollIntoView({behavior:'smooth'})}

function restart(){currentQ=0;Object.keys(scores).forEach(function(k){scores[k]=0});document.getElementById('quiz').style.display='block';document.getElementById('results').style.display='none';renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}

renderQuestion();
</script>
